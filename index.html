<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Registro de Calificaciones</title>
<meta name="theme-color" content="#1a1a2e">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#1a1a2e 0%,#2d2d4e 50%,#3a3a6a 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
  -webkit-font-smoothing:antialiased;
}
.card{
  background:#f5f0e8;border-radius:18px;padding:38px 32px;
  max-width:400px;width:100%;
  box-shadow:0 24px 70px rgba(0,0,0,.4);
  border-top:4px solid #c8422a;
}
.logo{
  width:76px;height:76px;border-radius:18px;margin:0 auto 20px;
  background:linear-gradient(135deg,#c8422a,#d4a843);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;color:#fff;box-shadow:0 6px 20px rgba(200,66,42,.35);
}
h1{font-family:'DM Serif Display',serif;text-align:center;font-size:1.5rem;margin-bottom:4px;color:#1a1a2e}
h1 span{color:#c8422a}
.subtitle{text-align:center;color:#888;font-size:0.82rem;margin-bottom:26px}
label{display:block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin-bottom:6px}
input{
  width:100%;padding:11px 14px;border:1.5px solid #c8c0b0;
  border-radius:8px;font-size:0.95rem;font-family:inherit;margin-bottom:16px;
  background:#fff;transition:border-color .2s,box-shadow .2s;
}
input:focus{outline:none;border-color:#c8422a;box-shadow:0 0 0 3px rgba(200,66,42,.15)}
.btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:#1a1a2e;color:#fff;
  font-weight:700;font-size:0.95rem;cursor:pointer;font-family:inherit;
  letter-spacing:0.02em;transition:transform .15s,box-shadow .2s;
}
.btn:hover:not(:disabled){background:#2d2d4e;transform:translateY(-1px);box-shadow:0 10px 25px rgba(0,0,0,.25)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.error{
  background:#fff0f0;border:1px solid #ffcccc;color:#8a1010;
  padding:10px 12px;border-radius:8px;font-size:0.82rem;margin-bottom:14px;
  display:none;
}
.error.show{display:block}
.spinner{
  display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;
  margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
.locked{
  background:#fff0f0;border:1.5px solid #ffcccc;color:#8a1010;
  padding:14px;border-radius:10px;font-size:0.85rem;text-align:center;font-weight:600;
}
.footer{text-align:center;margin-top:20px;font-size:0.7rem;color:#aaa;letter-spacing:0.04em}
</style>
</head>
<body>
<div class="card">
  <div class="logo">📚</div>
  <h1>Registro de <span>Calificaciones</span></h1>
  <p class="subtitle">Acceso protegido · Ingresa tus credenciales</p>
  <div class="error" id="errBox"></div>
  <div id="formArea">
    <label for="u">Usuario</label>
    <input type="text" id="u" autocomplete="off" autocapitalize="none" spellcheck="false">
    <label for="p">Contraseña</label>
    <input type="password" id="p" autocomplete="off">
    <button class="btn" id="submitBtn" onclick="tryLogin()">🔓 Ingresar</button>
  </div>
  <div id="lockArea" class="locked" style="display:none"></div>
  <div class="footer">🔒 Protegido con AES-GCM 256 · PBKDF2 310k</div>
</div>

// Anti-fuerza-bruta en UI
const MAX_ATTEMPTS = 5;
const LOCK_MS = 5 * 60 * 1000;
const LS_KEY = 'rc_auth_state_v1';

function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
function getState(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){return{};}}
function setState(s){localStorage.setItem(LS_KEY,JSON.stringify(s));}

function checkLock(){
  const s = getState();
  if(s.lockedUntil && Date.now() < s.lockedUntil){
    const mins = Math.ceil((s.lockedUntil - Date.now())/60000);
    document.getElementById('formArea').style.display='none';
    const la = document.getElementById('lockArea');
    la.style.display='block';
    la.textContent = `🚫 Demasiados intentos fallidos. Vuelve a intentar en ${mins} min.`;
    setTimeout(checkLock, 30000);
    return true;
  }
  if(s.lockedUntil && Date.now() >= s.lockedUntil){
    setState({});
    document.getElementById('formArea').style.display='block';
    document.getElementById('lockArea').style.display='none';
  }
  return false;
}

async function deriveKey(username, password){
  const enc = new TextEncoder();
  const material = await crypto.subtle.importKey(
    'raw',
    enc.encode(username + ':' + password),
    {name:'PBKDF2'},false,['deriveKey']
  );
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64d(SALT_B64), iterations:ITER, hash:'SHA-256'},
    material,
    {name:'AES-GCM', length:256},
    false,['decrypt']
  );
}

function showError(msg){
  const e = document.getElementById('errBox');
  e.textContent = msg; e.classList.add('show');
}
function clearError(){document.getElementById('errBox').classList.remove('show');}

async function tryLogin(){
  if(checkLock()) return;
  clearError();
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  if(!u || !p){ showError('Completa usuario y contraseña'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Verificando...';

  try{
    const key = await deriveKey(u,p);
    const plaintextBuf = await crypto.subtle.decrypt(
      {name:'AES-GCM', iv:b64d(IV_B64)}, key, b64d(CT_B64)
    );
    const html = new TextDecoder().decode(plaintextBuf);
    setState({});
    // Reemplaza el documento con la app descifrada
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    const s = getState();
    s.attempts = (s.attempts||0) + 1;
    if(s.attempts >= MAX_ATTEMPTS){
      s.lockedUntil = Date.now() + LOCK_MS;
      s.attempts = 0;
      setState(s); checkLock();
    }else{
      setState(s);
      showError(`Usuario o contraseña incorrectos. Intentos restantes: ${MAX_ATTEMPTS - s.attempts}`);
      document.getElementById('p').value='';
      document.getElementById('p').focus();
    }
    btn.disabled=false;
    btn.innerHTML='🔓 Ingresar';
  }
}

document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('p').focus();});
checkLock();
document.getElementById('u').focus();
</script>
