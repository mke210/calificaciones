// ════════════════════════════════════════════════════════════════════
// MÓDULO DE SINCRONIZACIÓN — Versión Optimizada
// Estructura:
//   1. renderSettingsTab()     → Pestaña principal de Ajustes
//   2. Gestión de Datos        → exportData / importData / saveAll
//   3. Sincronización QR       → Generación y escaneo bidireccional
//   4. Lógica de fusión        → _aplicarSincDia / importarSincDia
// ════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════════
// MÓDULO DE SINCRONIZACIÓN P2P (PeerJS / WebRTC)
// ════════════════════════════════════════════════════════════════════════════
//
// Flujo de uso:
//   1. Primera vez: cada dispositivo muestra su "ID de par" (peerID).
//      El usuario introduce el ID del otro dispositivo una sola vez.
//   2. El ID del par remoto se guarda en localStorage.
//   3. En sesiones posteriores la reconexión es automática.
//   4. "Sincronizar ahora" envía SOLO las calificaciones del grupo actual.
//   5. El receptor fusiona los datos y guarda localmente.
//
// Tecnología: PeerJS (WebRTC DataChannel con señalización en la nube)
// Sin servidor propio, sin instalaciones, solo Chrome/Edge en WiFi o internet.
// ════════════════════════════════════════════════════════════════════════════

// ── Estado global del módulo P2P ─────────────────────────────────────────
const P2P = {
  peer:       null,   // instancia PeerJS
  conns:      [],     // POOL de DataConnections activas (puede haber >1 por doble-connect)
  conn:       null,   // alias de conveniencia → primera conexión abierta del pool
  myId:       null,
  remoteId:   null,
  status:     'idle',
  lastSync:   null,
  autoRetry:  null,
  autoSync:   true,
  syncLog:    [],     // historial de sincronizaciones [{ts, dir, n, from}]
};

// Devuelve la primera conexión abierta del pool (la usamos para enviar)
function _p2pGetOpenConn() {
  return P2P.conns.find(c => c && c.open) || null;
}

const P2P_STORAGE_KEY = 'regCalif_p2p_v1'; // clave en localStorage

// ── Persistencia del estado P2P ──────────────────────────────────────────
// Detecta si un ID tiene el formato nuevo corto (rc-xxxxx)
function _p2pIdValido(id) {
  return typeof id === 'string' && /^rc-[a-z0-9]{5}$/.test(id);
}

function p2pLoadState() {
  try {
    const s = JSON.parse(localStorage.getItem(P2P_STORAGE_KEY) || '{}');
    // Si el ID guardado es un UUID viejo (formato largo), descartarlo
    P2P.myId     = _p2pIdValido(s.myId)     ? s.myId     : null;
    P2P.remoteId = _p2pIdValido(s.remoteId) ? s.remoteId : null;
    P2P.lastSync = s.lastSync || null;
    P2P.autoSync = s.autoSync !== false;
    P2P.syncLog  = s.syncLog  || [];
    // Limpiar storage si habia IDs viejos
    if (s.myId && !_p2pIdValido(s.myId)) {
      console.info('[P2P] ID antiguo detectado y descartado:', s.myId);
      localStorage.removeItem(P2P_STORAGE_KEY);
    }
  } catch(e) {}
}

function p2pSaveState() {
  localStorage.setItem(P2P_STORAGE_KEY, JSON.stringify({
    myId:     P2P.myId,
    remoteId: P2P.remoteId,
    lastSync: P2P.lastSync,
    autoSync: P2P.autoSync,
    syncLog:  P2P.syncLog.slice(-20), // max 20 entradas
  }));
}

// ── Cargar PeerJS desde CDN (lazy) ───────────────────────────────────────
function _cargarPeerJS(cb) {
  if (window.Peer) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
  s.onload  = () => cb();
  s.onerror = () => {
    // Espejo alternativo
    const s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js';
    s2.onload  = () => cb();
    s2.onerror = () => { p2pSetStatus('error', 'Sin internet para cargar PeerJS'); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

// ── Inicializar PeerJS ────────────────────────────────────────────────────
// ── Generar ID corto propio (8 chars alfanuméricos) ───────────────────────
// Prefijo 'rc' para evitar colisión con IDs genéricos del servidor PeerJS.
// El ID se persiste en localStorage y se reclama siempre al conectar.
function _p2pGenerarId() {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789'; // sin letras/números ambiguos
  let id = 'rc-';
  for (let i = 0; i < 5; i++) id += chars[Math.floor(Math.random() * chars.length)];
  return id; // ej: "rc-k7m3x"
}

function p2pInit() {
  p2pLoadState();
  p2pSetStatus('loading', 'Cargando módulo de conexión…');

  // Generar ID propio corto si aún no existe (o si el guardado era un UUID viejo)
  const esNuevoId = !P2P.myId;
  if (!P2P.myId) {
    P2P.myId = _p2pGenerarId();
    p2pSaveState();
  }

  _cargarPeerJS(() => {
    _p2pCrearPeer(P2P.myId);
    // Si se generó un ID nuevo, avisar que hay que volver a conectar
    if (esNuevoId) {
      setTimeout(() => {
        showToast('🆕 ID nuevo generado: ' + P2P.myId + ' — compártelo con el otro dispositivo', 'success');
      }, 1500);
    }
  });
}

// Crear instancia PeerJS con un ID dado (se separa para poder reintentar con ID nuevo)
// Intenta 3 configuraciones de servidor en secuencia si la anterior falla.
const _P2P_SERVERS = [
  // 1. Broker público de PeerJS
  { host: '0.peerjs.com', port: 443, secure: true, path: '/' },
  // 2. Espejo alternativo conocido
  { host: 'peerjs.92k.de',  port: 443, secure: true, path: '/' },
  // 3. Sin host especificado → PeerJS Cloud (default)
  null,
];
let _p2pServerIdx = 0;

function _p2pCrearPeer(peerId) {
  // Destruir instancia previa si existe
  if (P2P.peer) { try { P2P.peer.destroy(); } catch(e){} P2P.peer = null; }

  const iceServers = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:global.stun.twilio.com:3478' },
    { urls: 'stun:stun.cloudflare.com:3478' },
  ];

  const serverCfg = _P2P_SERVERS[_p2pServerIdx] || _P2P_SERVERS[0];
  const peerOpts = {
    debug: 0,
    config: { iceServers },
  };
  if (serverCfg) {
    Object.assign(peerOpts, { host: serverCfg.host, port: serverCfg.port, secure: serverCfg.secure, path: serverCfg.path });
  }

  try {
    P2P.peer = new Peer(peerId, peerOpts);
  } catch(e) {
    p2pSetStatus('error', 'No se pudo crear el par: ' + e.message);
    p2pRefreshUI();
    return;
  }

  // Timeout: si en 12 s no abre, probar siguiente servidor
  const openTimeout = setTimeout(() => {
    if (P2P.status !== 'connected' && P2P.status !== 'ready') {
      _p2pServerIdx = (_p2pServerIdx + 1) % _P2P_SERVERS.length;
      p2pSetStatus('loading', 'Servidor lento · Probando alternativo…');
      p2pRefreshUI();
      if (P2P.peer) { try { P2P.peer.destroy(); } catch(e){} P2P.peer = null; }
      setTimeout(() => _p2pCrearPeer(peerId), 500);
    }
  }, 12000);

  P2P.peer.on('open', id => {
    clearTimeout(openTimeout);
    _p2pServerIdx = 0; // reset para próxima vez
    P2P.myId = id;
    p2pSaveState();
    p2pSetStatus('ready', 'Listo · ID: ' + id);
    p2pRefreshUI();
    if (P2P.remoteId) p2pConectar(P2P.remoteId);
  });

  P2P.peer.on('connection', conn => {
    clearTimeout(openTimeout);
    _p2pConfigConn(conn);
    p2pSetStatus('connected', 'Conectado con ' + conn.peer);
    p2pRefreshUI();
  });

  P2P.peer.on('error', err => {
    clearTimeout(openTimeout);
    if (err.type === 'peer-unavailable') {
      p2pSetStatus('ready', 'Par remoto no disponible aún · Reintentando…');
      p2pScheduleRetry();
    } else if (err.type === 'unavailable-id') {
      // El ID corto está ocupado → generar uno nuevo y reconectar
      P2P.myId = _p2pGenerarId();
      p2pSaveState();
      p2pSetStatus('loading', 'ID ocupado · Obteniendo uno nuevo…');
      p2pRefreshUI();
      setTimeout(() => _p2pCrearPeer(P2P.myId), 800);
      return;
    } else if (err.type === 'server-error' || err.type === 'network' || err.type === 'socket-error') {
      // Problema de servidor → intentar siguiente
      _p2pServerIdx = (_p2pServerIdx + 1) % _P2P_SERVERS.length;
      p2pSetStatus('loading', 'Error de servidor · Probando alternativo…');
      p2pRefreshUI();
      if (P2P.peer) { try { P2P.peer.destroy(); } catch(e){} P2P.peer = null; }
      setTimeout(() => _p2pCrearPeer(peerId), 1500);
      return;
    } else {
      p2pSetStatus('error', 'Error: ' + (err.message || err.type));
      p2pScheduleRetry();
    }
    p2pRefreshUI();
  });

  P2P.peer.on('disconnected', () => {
    p2pSetStatus('ready', 'Desconectado del servidor · Reconectando…');
    try { P2P.peer.reconnect(); } catch(e) { setTimeout(() => _p2pCrearPeer(P2P.myId), 2000); }
  });

  P2P.peer.on('close', () => {
    p2pSetStatus('idle', 'Conexión cerrada');
    p2pRefreshUI();
  });
}

// ── Conectar al dispositivo remoto (rol: iniciador) ──────────────────────
// Solo el dispositivo que ingresó el ID del otro inicia la conexión outbound.
// El receptor simplemente acepta la conexión en peer.on('connection').
function p2pConectar(remoteId) {
  if (!remoteId || !P2P.peer) return;
  remoteId = remoteId.trim();
  if (!remoteId) return;

  // Cerrar conexión previa si existe
  if (P2P.conn) { try { P2P.conn.close(); } catch(e){} P2P.conn = null; }

  P2P.remoteId = remoteId;
  p2pSaveState();
  p2pSetStatus('connecting', 'Conectando con ' + remoteId + '…');
  p2pRefreshUI();

  const conn = P2P.peer.connect(remoteId, {
    reliable:      true,
    serialization: 'raw',
    label:         'sync',
  });
  _p2pConfigConn(conn);
}

// ── Configurar DataConnection — registra en el pool ──────────────────────
function _p2pConfigConn(conn) {
  // Evitar duplicados en el pool
  if (!P2P.conns.includes(conn)) P2P.conns.push(conn);
  P2P.conn = conn; // alias para compatibilidad

  conn.on('open', () => {
    if (P2P.autoRetry) { clearTimeout(P2P.autoRetry); P2P.autoRetry = null; }
    P2P.remoteId = conn.peer;
    p2pSaveState();
    p2pSetStatus('connected', 'Conectado · ' + conn.peer);
    p2pRefreshUI();
    showToast('🔗 Dispositivo conectado', 'success');
  });

  conn.on('data', raw => {
    let payload = null;
    if (typeof raw === 'object' && raw !== null) {
      payload = raw;
    } else if (typeof raw === 'string') {
      if (raw.startsWith('P2P:')) {
        try { payload = JSON.parse(LZString.decompressFromBase64(raw.slice(4))); }
        catch(e) { showToast('Error al descomprimir: ' + e.message, 'error'); }
      } else {
        try { payload = JSON.parse(raw); } catch(e) {}
      }
    }
    if (!payload) return;
    if (payload.type === 'request_all') { _p2pResponderPeticion(); return; }
    _p2pAplicarPayload(payload);
  });

  conn.on('close', () => {
    // Eliminar del pool al cerrar
    P2P.conns = P2P.conns.filter(c => c !== conn);
    P2P.conn  = _p2pGetOpenConn();
    if (!P2P.conn) {
      p2pSetStatus('ready', 'Desconectado del par');
      p2pRefreshUI();
      if (P2P.remoteId) p2pScheduleRetry();
    }
  });

  conn.on('error', err => {
    P2P.conns = P2P.conns.filter(c => c !== conn);
    P2P.conn  = _p2pGetOpenConn();
    p2pSetStatus('error', 'Error de conexión: ' + err.message);
    p2pRefreshUI();
  });
}

// ── Reintentar conexión automáticamente ──────────────────────────────────
function p2pScheduleRetry(delayMs = 8000) {
  if (P2P.autoRetry) clearTimeout(P2P.autoRetry);
  if (!P2P.remoteId) return;
  P2P.autoRetry = setTimeout(() => {
    if (P2P.status !== 'connected' && P2P.remoteId) {
      p2pConectar(P2P.remoteId);
    }
  }, delayMs);
}

// ── Envío automático: una calificación puntual ────────────────────────────
// Llamado desde saveGradeFromPopup cuando autoSync está activo.
// Envía SOLO la calificación modificada (payload mínimo).
function p2pEnviarCalificacion(groupId, key, value) {
  if (!P2P.autoSync || !_p2pGetOpenConn()) return;

  const g = data.groups.find(x => x.id === groupId);
  if (!g) return;

  const miniSync = {
    version: 'sync_v1',
    fecha: new Date().toISOString().slice(0, 10),
    grupos: {
      [groupId]: {
        id: groupId, name: g.name, subject: g.subject || '',
        students: g.students,
        grades:   { [key]: value },
        hwStatus: {}, conduct: {}, asistencia: {},
      }
    },
    totalCambios: 1,
  };

  const json = JSON.stringify({
    type: 'sync_grades', version: 'sync_v1',
    timestamp: Date.now(), sender: P2P.myId, sync: miniSync,
  });

  if (_p2pSend({ type: 'sync_grades', version: 'sync_v1',
                 timestamp: Date.now(), sender: P2P.myId, sync: miniSync })) {
    P2P.lastSync = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    p2pSaveState();
    const dot = document.getElementById('p2pStatusDot');
    if (dot) { dot.style.background = '#ffffff'; setTimeout(() => { dot.style.background = '#22cc55'; }, 200); }
    const lastEl = document.getElementById('p2pLastSyncLabel');
    if (lastEl) lastEl.textContent = '✅ Último envío: ' + P2P.lastSync;
  }
}

// ── Toggle auto-sync desde Ajustes ───────────────────────────────────────
function p2pToggleAutoSync() {
  P2P.autoSync = !P2P.autoSync;
  p2pSaveState();
  p2pRefreshUI();
  showToast(P2P.autoSync ? '🟢 Sincronización al guardar: activada' : '⏸ Sincronización al guardar: desactivada', 'success');
}

// ── Enviar calificaciones al par ──────────────────────────────────────────
function p2pSincronizarAhora() {
  if (!_p2pGetOpenConn()) {
    showToast('⚠️ Sin conexión activa — verifica que el otro dispositivo esté abierto', 'error');
    return;
  }

  const sync = _getSyncHoy();
  const totalCambios = sync.totalCambios || 0;

  if (totalCambios === 0 && Object.keys(sync.grupos).length === 0) {
    showToast('No hay calificaciones para sincronizar', 'error');
    return;
  }

  // Enviar usando función unificada (maneja raw y json automáticamente)
  const payloadObj = { type: 'sync_grades', version: 'sync_v1',
                       timestamp: Date.now(), sender: P2P.myId, sync };
  if (_p2pSend(payloadObj)) {
    P2P.lastSync = new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    p2pSaveState();
    showToast(`📤 ${totalCambios} calificaciones de hoy enviadas`, 'success');
    p2pRefreshUI();
  } else {
    showToast('Error al enviar — reconecta los dispositivos', 'error');
  }
}

// ── Enviar TODAS las calificaciones (sin filtro de fecha) ─────────────────
// Úsalo cuando la laptop no tiene datos que sí existen en la tablet.
function p2pEnviarTodo() {
  if (!_p2pGetOpenConn()) {
    showToast('⚠️ Sin conexión activa — verifica que el otro dispositivo esté abierto', 'error');
    return;
  }

  // Construir payload completo con TODOS los grupos y TODAS las calificaciones
  const syncCompleto = {
    version: 'sync_v1',
    fecha:   new Date().toISOString().slice(0, 10),
    grupos:  {},
    totalCambios: 0,
  };

  data.groups.forEach(g => {
    const totalGrupo = Object.keys(g.grades || {}).length;
    syncCompleto.grupos[g.id] = {
      id:        g.id,
      name:      g.name,
      subject:   g.subject || '',
      students:  g.students,
      grades:    { ...g.grades },
      hwStatus:  { ...g.hwStatus },
      conduct:   { ...g.conduct },
      asistencia: {},
    };
    syncCompleto.totalCambios += totalGrupo;
  });

  if (syncCompleto.totalCambios === 0) {
    showToast('No hay calificaciones registradas para enviar', 'error');
    return;
  }

  const payloadObj = {
    type: 'sync_grades', version: 'sync_v1',
    timestamp: Date.now(), sender: P2P.myId,
    sync: syncCompleto,
  };

  if (_p2pSend(payloadObj)) {
    P2P.lastSync = new Date().toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' });
    p2pSaveState();
    const nGrupos = Object.keys(syncCompleto.grupos).length;
    showToast(`📤 ${syncCompleto.totalCambios} calificaciones · ${nGrupos} grupos enviados`, 'success');
    p2pRefreshUI();
  } else {
    showToast('Error al enviar — reconecta los dispositivos', 'error');
  }
}

// ── La tablet responde a una petición de la laptop ────────────────────────
// Se ejecuta automáticamente cuando llega type:'request_all'
function _p2pResponderPeticion() {
  const syncCompleto = { version:'sync_v1', fecha: new Date().toISOString().slice(0,10),
                         grupos:{}, totalCambios:0 };
  data.groups.forEach(g => {
    const n = Object.keys(g.grades||{}).length;
    syncCompleto.grupos[g.id] = {
      id:g.id, name:g.name, subject:g.subject||'', students:g.students,
      grades:{...g.grades}, hwStatus:{...g.hwStatus},
      conduct:{...g.conduct}, asistencia:{},
    };
    syncCompleto.totalCambios += n;
  });
  _p2pSend({ type:'sync_grades', version:'sync_v1',
             timestamp:Date.now(), sender:P2P.myId, sync:syncCompleto });
  showToast(`📤 Tablet envió ${syncCompleto.totalCambios} calificaciones`, 'success');
}

// ── La laptop pide los datos a la tablet ──────────────────────────────────
// Un solo botón: la laptop envía la petición y espera la respuesta.
function p2pPedirDatos() {
  if (!_p2pGetOpenConn()) {
    showToast('⚠️ Sin conexión — abre la app en la tablet primero', 'error');
    return;
  }
  _p2pSend({ type:'request_all', sender:P2P.myId, timestamp:Date.now() });
  showToast('📡 Solicitando datos a la tablet…', 'success');
}

// ── Aplicar payload recibido (independiente del formato de transporte) ────
function _p2pAplicarPayload(payload) {
  if (!payload || payload.type !== 'sync_grades') return;

  try {
    _aplicarSincDia(payload.sync);
    const hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    P2P.lastSync = hora;
    // Registrar en el log
    const nGrupos = Object.keys(payload.sync.grupos || {}).length;
    const from = payload.senderLabel || payload.sender || 'otro dispositivo';
    P2P.syncLog.push({
      ts: hora,
      dir: 'recibido',
      n: payload.sync.totalCambios || 0,
      grupos: nGrupos,
      from,
    });
    p2pSaveState();
    p2pRefreshUI();
    // Refrescar la vista si está en calificaciones o ajustes
    if (currentTab === 'calificaciones' || currentTab === 'ajustes') {
      renderTab();
    }
    const lastEl = document.getElementById('p2pLastSyncLabel');
    if (lastEl) lastEl.textContent = '✅ Última sync: ' + hora;
    showToast(`📥 ${from} guardó y sincronizó ${nGrupos} grupo(s)`, 'success');
  } catch(e) {
    showToast('Error al aplicar datos: ' + e.message, 'error');
  }
}

// ── Función de envío unificada — usa cualquier conexión abierta del pool ──
function _p2pSend(payloadObj) {
  const conn = _p2pGetOpenConn();
  if (!conn) return false;
  try {
    const compressed = 'P2P:' + LZString.compressToBase64(JSON.stringify(payloadObj));
    conn.send(compressed);
    return true;
  } catch(e) {
    try { conn.send(payloadObj); return true; } catch(e2) {}
    return false;
  }
}

// ── Enviar TODAS las calificaciones al hacer clic en GUARDAR ─────────────
// Nueva función principal: se llama desde saveAll() cuando hay conexión activa.
function _p2pEnviarAlGuardar() {
  const syncCompleto = {
    version: 'sync_v1',
    fecha:   new Date().toISOString().slice(0, 10),
    grupos:  {},
    totalCambios: 0,
  };

  data.groups.forEach(g => {
    const nGrades = Object.keys(g.grades || {}).length;
    syncCompleto.grupos[g.id] = {
      id: g.id, name: g.name, subject: g.subject || '',
      students:  g.students,
      grades:    { ...g.grades },
      hwStatus:  { ...g.hwStatus },
      conduct:   { ...g.conduct },
      asistencia: {},
    };
    syncCompleto.totalCambios += nGrades;
  });

  const payloadObj = {
    type: 'sync_grades', version: 'sync_v1',
    timestamp: Date.now(), sender: P2P.myId,
    senderLabel: P2P.myId || 'Este dispositivo',
    sync: syncCompleto,
  };

  if (_p2pSend(payloadObj)) {
    const hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
    P2P.lastSync = hora;
    // Agregar al log
    P2P.syncLog.push({
      ts: hora,
      dir: 'enviado',
      n: syncCompleto.totalCambios,
      grupos: Object.keys(syncCompleto.grupos).length,
    });
    p2pSaveState();
    p2pRefreshUI();
    const nG = Object.keys(syncCompleto.grupos).length;
    showToast(`💾 Guardado · 📤 Enviado a ${P2P.remoteId || 'dispositivo conectado'} (${nG} grupos)`, 'success');
  } else {
    showToast('💾 Guardado localmente · ⚠️ Sin conexión para sincronizar', 'success');
  }
}


// ── Desconectar y olvidar el ID remoto ───────────────────────────────────
function p2pDesconectar() {
  if (P2P.autoRetry) { clearTimeout(P2P.autoRetry); P2P.autoRetry = null; }
  P2P.conns.forEach(c => { try { c.close(); } catch(e){} });
  P2P.conns = [];
  P2P.conn  = null;
  if (P2P.peer) { try { P2P.peer.destroy(); } catch(e){} P2P.peer = null; }
  P2P.remoteId = null;
  P2P.myId     = null;
  P2P.status   = 'idle';
  p2pSaveState();
  p2pRefreshUI();
  showToast('Sincronización desactivada', 'success');
}

// ── Guardar ID remoto ingresado manualmente ───────────────────────────────
function p2pGuardarIdRemoto() {
  const input = document.getElementById('p2pRemoteIdInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) { showToast('Ingresa el ID del otro dispositivo', 'error'); return; }
  if (val === P2P.myId) { showToast('No puedes conectarte a ti mismo', 'error'); return; }
  p2pConectar(val);
}

// ── Copiar propio ID al portapapeles ─────────────────────────────────────
function p2pCopiarMiId() {
  if (!P2P.myId) return;
  navigator.clipboard.writeText(P2P.myId).then(() => {
    showToast('ID copiado al portapapeles', 'success');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = P2P.myId;
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('ID copiado', 'success');
  });
}

function p2pSetStatus(status, msg) {
  P2P.status = status;
  P2P._statusMsg = msg;

// ── Restablecer completamente los IDs P2P ────────────────────────────────
// Úsalo cuando los IDs guardados son incompatibles (ej: UUIDs de versión anterior).
function p2pResetearIds() {
  if (!confirm('¿Restablecer los IDs de sincronización?\n\nSe generarán IDs nuevos en ambos dispositivos. Deberás volver a conectarlos una vez.')) return;
  if (P2P.autoRetry) { clearTimeout(P2P.autoRetry); P2P.autoRetry = null; }
  P2P.conns.forEach(c => { try { c.close(); } catch(e){} });
  P2P.conns = []; P2P.conn = null;
  if (P2P.peer) { try { P2P.peer.destroy(); } catch(e){} P2P.peer = null; }
  P2P.myId = null; P2P.remoteId = null; P2P.status = 'idle';
  P2P.lastSync = null; P2P.syncLog = [];
  localStorage.removeItem(P2P_STORAGE_KEY);
  showToast('🔁 IDs restablecidos — generando nuevos…', 'success');
  setTimeout(() => p2pInit(), 600);
}

// ── Olvidar ID remoto (para cambiar de par) ───────────────────────────────
function p2pOlvidarRemoto() {
  if (P2P.autoRetry) { clearTimeout(P2P.autoRetry); P2P.autoRetry = null; }
  P2P.conns.forEach(c => { try { c.close(); } catch(e){} });
  P2P.conns = [];
  P2P.conn  = null;
  P2P.remoteId = null;
  p2pSaveState();
  p2pSetStatus('ready', 'Par olvidado · Ingresa el nuevo ID');
  p2pRefreshUI();
}

  // Firebase: refrescar UI ahora que el panel existe

  if (typeof fbRefreshUI === 'function') {
    if (FB.status === 'idle' && FB.config) {

      fbRefreshUI();
      // Si no hay config guardada, mostrar el formulario
      if (!FB.config) {
        fbLoadConfig();
        fbRefreshUI();
      }
    }
  }

  // Actualizar dot de estado periódicamente mientras el panel está visible
  _p2pStartDotPulse();

let _p2pDotInterval = null;
function _p2pStartDotPulse() {
  if (_p2pDotInterval) clearInterval(_p2pDotInterval);
  _p2pDotInterval = setInterval(() => {
    const dot = document.getElementById('p2pStatusDot');
    if (!dot) { clearInterval(_p2pDotInterval); _p2pDotInterval = null; return; }
    const colors = {
      idle: '#888', loading: '#f0a500', ready: '#c8c800',
      connecting: '#4a80ff', connected: '#22cc55', error: '#ee3333',
    };
    dot.style.background = colors[P2P.status] || '#888';
    // Parpadeo durante connecting/loading
    if (P2P.status === 'connecting' || P2P.status === 'loading') {
      dot.style.opacity = dot.style.opacity === '0.3' ? '1' : '0.3';
    } else {
      dot.style.opacity = '1';
    }
  }, 600);
}

function openAvgEdit(sid, cellEl) {
  const g = currentGroup();
  if (!g) return;
  const stu = g.students.find(s => s.id === sid);
  if (!stu || stu.inactive) return;
  if (!g.manualAvg) g.manualAvg = {};

  // Si ya hay un input abierto en esta celda, no abrir otro
  if (cellEl.querySelector('input')) return;

  const curManual = g.manualAvg[sid] !== undefined ? g.manualAvg[sid] : '';
  const calcVal = (()=>{
    let s=0,n=0;
    g.activities.forEach(a=>{
      const v=g.grades[sid+'_'+a.id];
      if(v===undefined||v==='') return;
      if(v==='NE'){s+=0;n++;return;}
      if(typeof v==='string'&&v.startsWith('T:')){const f=parseFloat(v.slice(2));if(!isNaN(f)){s+=f;n++;}}
      else if(typeof v==='string'&&v.startsWith('IN:')){const f=parseFloat(v.slice(3));if(!isNaN(f)){s+=f;n++;}}
      else{const f=parseFloat(v);if(!isNaN(f)){s+=f;n++;}}
    });
    return n>0?(s/n):null;
  })();

  const popup = document.createElement('div');
  popup.style.cssText = 'position:fixed;top:80px;right:16px;z-index:500;background:white;border:2px solid var(--blue);border-radius:8px;padding:10px 12px;box-shadow:0 6px 28px rgba(0,0,0,0.20);width:190px;animation:popIn 0.15s ease;';

  popup.innerHTML = `
    <div style="font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#888;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">✏️ Promedio — ${escHtml(stu.name)}</div>
    ${calcVal !== null ? `<div style="font-size:0.65rem;color:#aaa;margin-bottom:5px;">Automático: <b>${formatStudentAvg(calcVal)}</b></div>` : ''}
    <input id="avgEditInput" type="number" min="0" max="10" step="0.1" value="${curManual}" placeholder="0 – 10"
      style="width:100%;border:1.5px solid var(--border);border-radius:5px;padding:5px 8px;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:8px;" />
    <div style="display:flex;gap:5px;justify-content:flex-end;">
      ${curManual!==''?`<button onclick="clearManualAvg('${sid}')" style="border:1.5px solid var(--accent);background:transparent;color:var(--accent);border-radius:5px;padding:4px 8px;font-size:0.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;">↺</button>`:''}
      <button onclick="saveManualAvg('${sid}', false)" style="background:var(--blue);color:white;border:none;border-radius:5px;padding:4px 10px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">✓</button>
      <button onclick="saveManualAvg('${sid}', true)" title="Guardar y bajar" style="background:var(--green);color:white;border:none;border-radius:5px;padding:4px 10px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">↓</button>
    </div>`;

  document.body.appendChild(popup);
  const inp = document.getElementById('avgEditInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveManualAvg(sid, true); }
    if (e.key === 'Escape') { popup.remove(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); saveManualAvg(sid, true); }
  });
  // Cerrar al hacer clic fuera
  setTimeout(() => {
    document.addEventListener('mousedown', function handler(e) {
      if (!popup.contains(e.target) && e.target !== cellEl) { popup.remove(); document.removeEventListener('mousedown', handler); }
    });
  }, 100);
  window._avgPopup = popup;
}

function saveManualAvg(sid, jump) {
  const g = currentGroup();
  if (!g.manualAvg) g.manualAvg = {};
  const inp = document.getElementById('avgEditInput');
  const val = inp ? inp.value.trim() : '';
  const num = parseFloat(val);
  if (val === '' || isNaN(num) || num < 0 || num > 10) {
    showToast('Ingresa un valor entre 0 y 10', ''); return;
  }
  g.manualAvg[sid] = num;
  autoSave();
  if (window._avgPopup) { window._avgPopup.remove(); window._avgPopup = null; }
  // Actualizar celda
  const avgEl = document.querySelector(`[data-avg="${sid}"]`);
  if (avgEl) {
    const avg = calcAvg(g, sid);
    const cls = avg !== null ? gradeClass(roundStudentAvg(avg)||avg) : '';
    const avgStr = avg !== null ? formatStudentAvg(avg) : '-';
    avgEl.innerHTML = `<span class="grade-badge ${cls}" style="font-size:0.75rem;padding:2px 5px">${avgStr}</span><span title="Promedio manual" style="display:block;width:5px;height:5px;border-radius:50%;background:var(--gold);margin:1px auto 0;"></span>`;
  }
  showToast('✅ Promedio guardado', 'success');
  // Saltar al siguiente alumno activo
  if (jump !== false) {
    const activos = g.students.filter(s => !s.inactive);
    const idx = activos.findIndex(s => s.id === sid);
    if (idx !== -1 && idx + 1 < activos.length) {
      const nextSid = activos[idx + 1].id;
      const nextCell = document.querySelector(`[data-avg="${nextSid}"]`);
      if (nextCell) setTimeout(() => openAvgEdit(nextSid, nextCell), 80);
    }
  }
}

function calcAvg(g,sid){
  const stu = g.students.find(s=>s.id===sid);
  if (stu && stu.inactive) return null;
  // Si hay promedio manual, usarlo
  if (!g.manualAvg) g.manualAvg = {};
  if (g.manualAvg[sid] !== undefined && g.manualAvg[sid] !== '') return parseFloat(g.manualAvg[sid]);
  let s=0,n=0;
  const totalActivities = g.activities.length;
  if(totalActivities===0) return null;
  g.activities.forEach(a=>{
    const v=g.grades[sid+'_'+a.id];
    if(v===undefined||v==='') return;
    if(v==='NE'){s+=0;n++;return;}
    if(typeof v==='string' && v.startsWith('T:')){
      const f=parseFloat(v.slice(2)); if(!isNaN(f)){s+=f;n++;}
    } else if(typeof v==='string' && v.startsWith('IN:')){
      const f=parseFloat(v.slice(3)); if(!isNaN(f)){s+=f;n++;}
    } else {
      const f=parseFloat(v); if(!isNaN(f)){s+=f;n++;}
    }
  });
  return n>0 ? Math.round(s/totalActivities) : null;
}
// Calificación final como entero
function truncateAvg(avg){
  if(avg===null) return null;
  return Math.round(avg);
}
function roundStudentAvg(avg){ return truncateAvg(avg); }
function formatStudentAvg(avg){
  if(avg===null) return '-';
  return String(Math.round(avg));
}
function gradeClass(avg){if(avg>=9)return'grade-A';if(avg>=7)return'grade-B';if(avg>=6)return'grade-C';return'grade-D';}

function navigateGradeCell(sid, aid, dir) {
  const g = currentGroup();
  if (!g) return;
  const students = g.students.filter(s => !s.inactive);
  const acts     = g.activities;
  const sIdx = students.findIndex(s => s.id === sid);
  const aIdx = acts.findIndex(a => a.id === aid);
  let nSIdx = sIdx, nAIdx = aIdx;
  if (dir === 'down')  nSIdx = Math.min(sIdx + 1, students.length - 1);
  if (dir === 'up')    nSIdx = Math.max(sIdx - 1, 0);
  if (dir === 'right') nAIdx = Math.min(aIdx + 1, acts.length - 1);
  if (dir === 'left')  nAIdx = Math.max(aIdx - 1, 0);
  if (nSIdx === sIdx && nAIdx === aIdx) return; // sin cambio
  const nSid = students[nSIdx].id;
  const nAid = acts[nAIdx].id;
  const key  = nSid + '_' + nAid;
  const cell = document.querySelector(`[data-grade="${key}"]`);
  if (cell) {
    closeGradePopup();
    // Hacer scroll para que la celda sea visible
    cell.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    setTimeout(() => openGradePopup(nSid, nAid, cell), 30);
  }
}

function refreshGradeCell(sid, aid) {
  const g = currentGroup();
  const key = sid + '_' + aid;
  const val = g.grades[key] !== undefined ? g.grades[key] : '';

  // Update grade cell
  const cellEl = document.querySelector(`[data-grade="${key}"]`);
  if (cellEl) {
    let displayVal, displayStyle = '';
    const stu = g.students.find(s => s.id === sid);
    if (stu && stu.inactive) {
      displayVal = val !== '' && val !== 'NE' ? val : '—';
      displayStyle = 'color:#ccc;';
    } else if (val === 'NE') {
      displayVal = 'NE';
      displayStyle = 'background:#f8d7da;color:#721c24;border-radius:4px;padding:2px 7px;font-weight:700;font-size:0.78rem;';
    } else if (typeof val === 'string' && val.startsWith('T:')) {
      const num = val.slice(2);
      displayVal = num !== '' ? `⏰ ${num}` : '⏰ Tarde';
      displayStyle = 'background:#ffe5cc;color:#7a3a00;border-radius:4px;padding:2px 7px;font-weight:700;font-size:0.78rem;';
    } else if (typeof val === 'string' && val.startsWith('IN:')) {
      const num = val.slice(3);
      displayVal = num !== '' ? `🏥 ${num}` : '🏥 Inasist.';
      displayStyle = 'background:#e8d5f0;color:#5a2d7a;border-radius:4px;padding:2px 7px;font-weight:700;font-size:0.78rem;';
    } else {
      displayVal = val !== '' ? val : '—';
    }
    cellEl.style.cssText = displayStyle;
    cellEl.textContent = displayVal;
  }

  // Update promedio cell for this student
  const avgEl = document.querySelector(`[data-avg="${sid}"]`);
  if (avgEl) {
    const avg = calcAvg(g, sid);
    const stu = g.students.find(s => s.id === sid);
    const isManual = g.manualAvg && g.manualAvg[sid] !== undefined && g.manualAvg[sid] !== '';
    const manualDot = isManual ? `<span title="Promedio manual" style="display:block;width:5px;height:5px;border-radius:50%;background:var(--gold);margin:1px auto 0;"></span>` : '';
    if (stu && stu.inactive) {
      avgEl.innerHTML = `<span class="grade-badge" style="font-size:0.75rem;padding:2px 5px">—</span>`;
    } else {
      const avgStr = avg !== null ? formatStudentAvg(avg) : '-';
      const cls = avg !== null ? gradeClass(roundStudentAvg(avg)||avg) : '';
      avgEl.innerHTML = `<span class="grade-badge ${cls}" style="font-size:0.75rem;padding:2px 5px">${avgStr}</span>${manualDot}`;
    }
  }

  // Update promedio general row
  const genEl = document.querySelector('[data-gen-avg]');
  if (genEl) {
    let genSum = 0, genCnt = 0;
    g.students.forEach((s, sIdx) => {
      if (!s.inactive) { const a = calcAvg(g, s.id); if (a !== null) { genSum += a; genCnt++; } }
    });
    const genAvgVal = genCnt > 0 ? (genSum / genCnt).toFixed(1) : '-';
    const genAvgCls = genCnt > 0 ? gradeClass(parseFloat(genAvgVal)) : '';
    genEl.innerHTML = `<span class="grade-badge ${genAvgCls}" style="font-size:0.95rem;padding:5px 14px">${genAvgVal}</span>`;
  }
}

}

function confirmQuickAdd(type) {
  const g = currentGroup(); if (!g) return;
  const inp = document.getElementById('quickAddInput');
  if (!inp) return;
  const raw = inp.value.trim();
  if (!raw) { inp.style.borderColor='var(--accent)'; inp.focus(); return; }

  const names = raw.split(',').map(s=>s.trim()).filter(Boolean);
  if (!names.length) return;

  _snapshot();
  if (type === 'student') {

    names.forEach(n => g.activities.push({id: Date.now().toString(36)+Math.random().toString(36).slice(2), name: n}));

    currentTab = 'calificaciones'; renderMain();
    showToast(names.length===1 ? `✅ Actividad agregada: ${names[0]}` : `✅ ${names.length} actividades agregadas`, 'success');

// Importar desde texto pegado (funciona en Android WebView)
function _importApply(imp) {
  if (!imp.groups || !Array.isArray(imp.groups)) throw new Error('Formato inválido');
  _snapshot();
  imp.groups.forEach(g => {
    if (!g.grades)    g.grades    = {};
    if (!g.conduct)   g.conduct   = {};
    if (!g.hwStatus)  g.hwStatus  = {};
    if (!g.manualAvg) g.manualAvg = {};
    if (!g.students)  g.students  = [];
    if (!g.activities) g.activities = [];
    g.activities.forEach(a => { if(!a.id) a.id = Date.now().toString(36)+Math.random().toString(36).slice(2); });
    g.students.forEach(s   => { if(!s.id) s.id = Date.now().toString(36)+Math.random().toString(36).slice(2); });
    const newGrades = {};
    Object.entries(g.grades).forEach(([k,v]) => {
      if (v === 'NE' || (typeof v === 'string' && (v.startsWith('T:') || v.startsWith('IN:')))) {
        newGrades[k] = v;
      } else {
        const n = parseFloat(v);
        newGrades[k] = isNaN(n) ? v : n;
      }
    });
    g.grades = newGrades;
  });
  data = imp;
  autoSave();
  currentGroupId = null;
  currentTab = 'calificaciones';
  renderSidebar();
  if (data.groups.length) selectGroup(data.groups[0].id);
  else renderMain();
  showToast(`📥 ${data.groups.length} grupos importados correctamente`, 'success');
}

function importData(event){
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { _importApply(JSON.parse(e.target.result)); }
    catch(err) { showToast('Error al importar: ' + err.message, 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

    @media print{body{margin:16px;} button{display:none;}}

  <tbody>${incidentRows}</tbody></table>`:''}

  <div class="footer">Generado por Registro de Calificaciones</div>
  <script>window.onload=()=>{window.print();}<\/script>
  </body></html>`);
  win.document.close();
}

function shareWhatsApp(sid) {
  const g = currentGroup();
  const s = g.students.find(x=>x.id===sid);
  if (!s) return;

  const clabels = ['','Excelente','Regular','Mala conducta','Muy grave'];
  const cd = g.conduct[sid]||{}; const cLev=cd.level||0; const incidents=cd.incidents||[];
  const avg = calcAvg(g,sid); const avgStr = avg!==null?formatStudentAvg(avg):'-';
  const now = new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});

  let msg = `📋 *REPORTE DEL ALUMNO*\n`;
  msg += `👤 *${s.name}*\n`;
  msg += `🏫 Grupo: ${g.name}${g.subject?' — '+g.subject:''}\n`;
  msg += `📅 Fecha: ${now}\n`;
  msg += `⭐ *Promedio Final: ${avgStr}*\n\n`;

  if (g.activities.length) {
    msg += `📚 *TRABAJOS Y CALIFICACIONES*\n`;
    g.activities.forEach(a=>{
      const key=sid+'_'+a.id;
      const grade=g.grades[key];
      let gd='—';
      if(grade==='NE') gd='❌ No entregado';
      else if(typeof grade==='string'&&grade.startsWith('T:')){ const n=grade.slice(2); gd=n?`⏰ Tarde (${n})`:'⏰ Tarde'; }
      else if(typeof grade==='string'&&grade.startsWith('IN:')){ const n=grade.slice(3); gd=n?`🏥 Inasistencia — posterior: ${n}`:'🏥 Inasistencia (sin calificación)'; }
      else if(grade!==undefined&&grade!=='') gd=`✅ ${grade}`;
      msg += `• ${a.name}: ${gd}\n`;
    });
    msg += '\n';
  }

  if (cLev>0) {
    msg += `🚨 *CONDUCTA: ${clabels[cLev]}*\n`;
    incidents.forEach(inc=>{ msg+=`• ${inc.date}: ${inc.text}\n`; });
    msg += '\n';
  }

  // Tardanzas del alumno con motivos
  const _asistData = JSON.parse(localStorage.getItem('regCalif_v3')||'{}').asistencia || {};
  const prefix = g.id + '_';
  const tardanzas = [];
  Object.keys(_asistData).filter(k=>k.startsWith(prefix)).forEach(k=>{
    const fecha = k.slice(prefix.length);
    const rec = _asistData[k];
    if(rec[sid]==='tarde'){
      const motivo = rec[sid+'_motivo'] || '';
      tardanzas.push({fecha, motivo});
    }
  });
  if(tardanzas.length){
    tardanzas.sort((a,b)=>a.fecha.localeCompare(b.fecha));
    msg += `⏰ *TARDANZAS (${tardanzas.length})*\n`;
    tardanzas.forEach(t=>{
      const d = new Date(t.fecha+'T12:00:00');
      const fechaFmt = d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
      msg += `• ${fechaFmt}${t.motivo?' — '+t.motivo:''}\n`;
    });
    msg += '\n';
  }

  const encoded = encodeURIComponent(msg);
  window.open(`https://wa.me/?text=${encoded}`, '_blank');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// AUTO-SANACIÓN AL ARRANCAR: limpia estado P2P viejo + caché del navegador
// ════════════════════════════════════════════════════════════════════
(function _autoSanar() {
  // 1. Desregistrar service workers que puedan servir versiones cacheadas
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    }).catch(() => {});
  }

  // 2. Limpiar caches de la API Cache Storage (PWA)
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
  }

  // 3. Detectar y borrar IDs P2P viejos (UUIDs largos de versiones anteriores)
  //    Un ID válido nuevo tiene formato: rc-xxxxx (8 chars total)
  const P2P_KEY = 'regCalif_p2p_v1';
  try {
    const saved = JSON.parse(localStorage.getItem(P2P_KEY) || '{}');
    const esIdViejo = id => typeof id === 'string' && !/^rc-[a-z0-9]{5}$/.test(id);
    if (esIdViejo(saved.myId) || esIdViejo(saved.remoteId)) {
      console.info('[AutoSanación] IDs P2P antiguos detectados — limpiando:', saved.myId, saved.remoteId);
      localStorage.removeItem(P2P_KEY);
    }
  } catch(e) {}
})();

function setAsist(sid,estado){
  _loadAsist();
  const g=currentGroup();if(!g)return;
  const key=_asistKey(g.id,_asist.fecha);
  if(!_asist.records[key])_asist.records[key]={};
  _asist.records[key][sid]=estado;
  // Si cambia de tarde a otro estado, limpiar el motivo
  if(estado!=='tarde') delete _asist.records[key][sid+'_motivo'];
  _saveAsist();
  const s=g.students.find(x=>x.id===sid);
  const badges={presente:'<span style="background:#d4edda;color:#155724;padding:3px 12px;border-radius:20px;font-weight:700;font-size:0.78rem">✅ Presente</span>',ausente:'<span style="background:#f8d7da;color:#721c24;padding:3px 12px;border-radius:20px;font-weight:700;font-size:0.78rem">❌ Ausente</span>',tarde:(()=>{const mot=rec[s.id+'_motivo'];return '<span style="background:#ffe5cc;color:#7a3a00;padding:3px 12px;border-radius:20px;font-weight:700;font-size:0.78rem">⏰ Tarde'+(mot?' — '+escHtml(mot):'')+'</span>';})()};
  const badgeEl=document.getElementById('asistBadge_'+sid);
  if(badgeEl)badgeEl.innerHTML=badges[estado]||'';
  const fb=document.getElementById('asistLastScan');
  const nm=document.getElementById('asistLastName');
  const dt=document.getElementById('asistLastDetail');
  const ic=document.getElementById('asistLastIcon');
  if(fb&&nm&&dt&&ic){
    fb.style.display='flex';
    nm.textContent=s?s.name:sid;
    dt.textContent=estado==='presente'?'Marcado como presente ✅':estado==='tarde'?'Marcado como tardanza ⏰':'Marcado como ausente ❌';
    ic.textContent=estado==='presente'?'✅':estado==='tarde'?'⏰':'❌';
    fb.style.background=estado==='presente'?'#f0fff4':estado==='tarde'?'#fff8e6':'#fff5f5';
    fb.style.borderColor=estado==='presente'?'#a0ddb0':estado==='tarde'?'#f0c060':'#ffaaaa';
  }
}

function marcarTodos(estado){
  const g=currentGroup();if(!g)return;
  _loadAsist();
  const key=_asistKey(g.id,_asist.fecha);
  if(!_asist.records[key])_asist.records[key]={};
  g.students.filter(s=>!s.inactive).forEach(s=>{_asist.records[key][s.id]=estado;});
  _saveAsist();renderTab();
  showToast(estado==='presente'?'✅ Todos presentes':'❌ Todos ausentes','success');
}

function setAsistCamMode(m){_asist.camMode=m;detenerCamaraAsist();renderTab();}

function iniciarCamaraAsist(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){showToast('Cámara no disponible','error');return;}
  const vw=document.getElementById('asistVideoWrap');
  const bi=document.getElementById('btnIniciarCam');
  const bd=document.getElementById('btnDetenerCam');
  const fb=document.getElementById('asistScanFeedback');
  if(vw)vw.style.display='block';if(bi)bi.style.display='none';if(bd)bd.style.display='flex';
  if(fb)fb.innerHTML='<span style="color:#2a7a4b;font-size:0.85rem">🔍 Apunta al código QR del alumno...</span>';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
    .then(stream=>{
      _asist.scanStream=stream;_asist.scanActive=true;
      const v=document.getElementById('asistVideo');if(v){v.srcObject=stream;v.play();}
      _cargarJsQR(()=>_asistScanFrame());
    })
    .catch(err=>{if(fb)fb.innerHTML=`<span style="color:red">❌ ${err.message}</span>`;showToast('Error cámara: '+err.message,'error');});
}

function detenerCamaraAsist(){
  _asist.scanActive=false;
  if(_asist.scanAnim){cancelAnimationFrame(_asist.scanAnim);_asist.scanAnim=null;}
  if(_asist.scanStream){_asist.scanStream.getTracks().forEach(t=>t.stop());_asist.scanStream=null;}
  const vw=document.getElementById('asistVideoWrap');const bi=document.getElementById('btnIniciarCam');const bd=document.getElementById('btnDetenerCam');
  if(vw)vw.style.display='none';if(bi)bi.style.display='flex';if(bd)bd.style.display='none';
}

function _asistScanFrame(){
  if(!_asist.scanActive)return;
  const v=document.getElementById('asistVideo');
  if(!v){_asist.scanAnim=requestAnimationFrame(_asistScanFrame);return;}
  function _hit(raw){
    const now=Date.now();
    if(raw!==_asist.lastScan||now-_asist.lastScanTs>3000){
      _asist.lastScan=raw;_asist.lastScanTs=now;
      _procesarQRAsistencia(raw);
      const box=document.getElementById('asistScanBox');
      if(box){box.style.borderColor='#d4a843';setTimeout(()=>{if(box)box.style.borderColor='#2a7a4b';},500);}
    }
  }
  if(window._useBD&&window.BarcodeDetector&&v.readyState===v.HAVE_ENOUGH_DATA){
    new BarcodeDetector({formats:['qr_code']}).detect(v)
      .then(codes=>{if(codes.length)_hit(codes[0].rawValue);})
      .catch(()=>{});
    _asist.scanAnim=requestAnimationFrame(_asistScanFrame);
    return;
  }
  const c=document.getElementById('asistScanCanvas');
  if(!c||!window.jsQR){_asist.scanAnim=requestAnimationFrame(_asistScanFrame);return;}
  const ctx=c.getContext('2d');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0,c.width,c.height);
    const code=window.jsQR(ctx.getImageData(0,0,c.width,c.height).data,c.width,c.height,{inversionAttempts:'dontInvert'});
    if(code&&code.data)_hit(code.data);
  }
  _asist.scanAnim=requestAnimationFrame(_asistScanFrame);
}

window._asistDecodeFile=function(file){
  if(!file||!file.type.startsWith('image/'))return;
  const fb=document.getElementById('asistScanFeedback');
  if(fb)fb.innerHTML='<span style="color:#2a4a7a;font-size:0.85rem">⏳ Analizando imagen...</span>';
  _cargarJsQR(()=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1600;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      const code=window.jsQR(ctx.getImageData(0,0,w,h).data,w,h,{inversionAttempts:'attemptBoth'});
      if(code&&code.data){if(fb)fb.innerHTML='<span style="color:#2a7a4b">✅ QR detectado</span>';_procesarQRAsistencia(code.data);}
      else{if(fb)fb.innerHTML='<span style="color:red">❌ No se detectó QR. Mejor iluminación/enfoque.</span>';}
    };img.src=url;
  });
};

function _cargarJsQR(cb){
  if(window.BarcodeDetector){window._useBD=true;cb();return;}
  if(window.jsQR){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
  s.onload=cb;
  s.onerror=function(){
    const s2=document.createElement('script');
    s2.src='https://unpkg.com/jsqr@1.4.0/dist/jsQR.js';
    s2.onload=cb;
    s2.onerror=function(){showToast('Sin internet para cargar el escaner. Recarga la pagina.','error');};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

function _procesarQRAsistencia(raw){
  const g=currentGroup();if(!g)return;
  const fb=document.getElementById('asistScanFeedback');
  let sid=null;
  // 1) Buscar por qrCode externo (ej: "WPBQ")
  const byExt=g.students.find(s=>s.qrCode&&s.qrCode===raw.trim());
  if(byExt)sid=byExt.id;
  // 2) Formato propio ASIST:grupoId:studentId:nombre
  if(!sid&&raw.startsWith('ASIST:')){const p=raw.split(':');if(p.length>=3)sid=p[2];}
  // 3) Nombre exacto
  if(!sid){const byN=g.students.find(s=>s.name.toLowerCase().trim()===raw.toLowerCase().trim());if(byN)sid=byN.id;}
  if(!sid){
    if(fb)fb.innerHTML=`<span style="color:#b85c00;font-size:0.82rem">⚠️ QR "<strong>${escHtml(raw.slice(0,30))}</strong>" no está asignado a ningún alumno.<br><span style="font-size:0.72rem">Ve a 📊 Calificaciones → toca 📷 +QR junto al nombre del alumno para asignarlo</span></span>`;
    return;
  }
  const s=g.students.find(x=>x.id===sid);
  if(!s){if(fb)fb.innerHTML='<span style="color:red">❌ Alumno no encontrado.</span>';return;}
  setAsist(sid,'presente');
  if(fb)fb.innerHTML=`<span style="color:#2a7a4b;font-weight:700;font-size:0.95rem">✅ ${escHtml(s.name)} — Presente</span>`;
  try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const gn=ac.createGain();o.connect(gn);gn.connect(ac.destination);o.frequency.value=880;gn.gain.setValueAtTime(0.15,ac.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);o.start();o.stop(ac.currentTime+0.25);}catch(e){}
}

function _generarExcelAsistencia(){
  const g=currentGroup();if(!g)return;
  _loadAsist();
  const periodo=document.querySelector('input[name=expP]:checked')?.value||'mes';
  const prefix=g.id+'_';
  const todFechas=Object.keys(_asist.records).filter(k=>k.startsWith(prefix)&&!k.includes('_motivo')).map(k=>k.slice(prefix.length)).sort();
  const alumnos=g.students.filter(s=>!s.inactive);
  let fechas=todFechas, titulo='', archivo='';
  if(periodo==='dia'){
    const dia=document.getElementById('exportDia').value;
    fechas=[dia];
    const d=new Date(dia+'T12:00');
    titulo=d.toLocaleDateString('es-MX',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    titulo=titulo.charAt(0).toUpperCase()+titulo.slice(1);
    archivo=`asistencia_dia_${dia}`;
  } else if(periodo==='mes'){
    const mes=document.getElementById('exportMes').value;
    fechas=todFechas.filter(f=>f.startsWith(mes));
    const[y,mo]=mes.split('-');
    const n=new Date(y,mo-1,1).toLocaleDateString('es-MX',{month:'long',year:'numeric'});
    titulo='Asistencia — '+n.charAt(0).toUpperCase()+n.slice(1);
    archivo=`asistencia_mes_${mes}`;
  } else {
    const anio=document.getElementById('exportAnio').value;
    fechas=todFechas.filter(f=>f.startsWith(anio));
    titulo=`Reporte Anual de Asistencia ${anio}`;
    archivo=`asistencia_anio_${anio}`;
  }
  if(!fechas.length){showToast('No hay registros en el período seleccionado','error');return;}

  const iconos={presente:'✅',ausente:'❌',tarde:'⏰'};
  const bgColor={presente:'#d4edda',ausente:'#f8d7da',tarde:'#ffe5cc'};
  const fgColor={presente:'#155724',ausente:'#721c24',tarde:'#7a3a00'};

  // Calcular totales
  const tots=alumnos.map(s=>{
    let p=0,a=0,t=0;
    fechas.forEach(f=>{const r=_asist.records[prefix+f]||{};if(r[s.id]==='presente')p++;else if(r[s.id]==='ausente')a++;else if(r[s.id]==='tarde')t++;});
    return{p,a,t};
  });

  // Build Excel-compatible HTML table
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Asistencia</x:Name></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--><style>
body{font-family:Arial,sans-serif;font-size:10pt}table{border-collapse:collapse}
th{background:#1a3a2a;color:white;font-weight:bold;padding:6px 8px;border:1px solid #aaa;text-align:center;font-size:8.5pt;vertical-align:bottom}
th.nh{background:#1a1a2e;text-align:left}th.tot{background:#2a4a3a}
td{padding:5px 8px;border:1px solid #ddd;font-size:9pt;vertical-align:middle}
td.n{font-weight:600;color:#1a1a2e;background:#f8f6f0}td.c{text-align:center;font-weight:600}
.tt{font-size:13pt;font-weight:bold;color:#1a1a2e;margin-bottom:3px}.st{font-size:9.5pt;color:#555;margin-bottom:12px}
</style></head><body>
<p class="tt">📋 ${titulo}</p>
<p class="st">Grupo: <b>${g.name}</b>${g.subject?' — '+g.subject:''} &nbsp;|&nbsp; Alumnos: <b>${alumnos.length}</b> &nbsp;|&nbsp; Días: <b>${fechas.length}</b> &nbsp;|&nbsp; Generado: ${new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'})}</p>
<table><thead><tr><th class="nh" style="min-width:180px">#&nbsp; Alumno</th>`;

  fechas.forEach(f=>{
    const d=new Date(f+'T12:00');
    const dw=d.toLocaleDateString('es-MX',{weekday:'short'}).replace('.','');
    const dm=d.getDate();
    const mn=d.toLocaleDateString('es-MX',{month:'short'}).replace('.','');
    html+=`<th style="min-width:46px;width:46px;font-size:7.5pt">${dw}<br>${dm}<br>${mn}</th>`;
  });
  html+=`<th class="tot" style="min-width:44px">✅<br>Pres.</th><th class="tot" style="min-width:44px">❌<br>Aus.</th><th class="tot" style="min-width:44px">⏰<br>Tarde</th><th class="tot" style="min-width:54px">%<br>Asist.</th></tr></thead><tbody>`;

  alumnos.forEach((s,i)=>{
    html+=`<tr><td class="n">${i+1}&nbsp; ${s.name}</td>`;
    fechas.forEach(f=>{
      const r=_asist.records[prefix+f]||{};
      const st=r[s.id]||'';
      const mot=st==='tarde'?(r[s.id+'_motivo']||''):'';
      html+=`<td class="c" style="background:${bgColor[st]||'#fff'};color:${fgColor[st]||'#bbb'}" title="${mot?'Motivo: '+mot:''}">${st?iconos[st]:'—'}</td>`;
    });
    const tot=tots[i];
    const pct=fechas.length>0?Math.round(tot.p/fechas.length*100):0;
    html+=`<td class="c" style="background:#e8f5e9">${tot.p}</td><td class="c" style="background:#fce8e8">${tot.a}</td><td class="c" style="background:#fff3e0">${tot.t}</td><td class="c" style="background:${pct>=80?'#c8e6c9':pct>=60?'#fff9c4':'#ffcdd2'};font-weight:bold">${pct}%</td></tr>`;
  });

  // Fila totales grupo
  html+=`<tr style="background:#e8e4dc;font-weight:bold"><td class="n" style="font-weight:bold">TOTAL GRUPO</td>`;
  fechas.forEach(f=>{
    const r=_asist.records[prefix+f]||{};
    let p=0,a=0,t=0;
    alumnos.forEach(s=>{if(r[s.id]==='presente')p++;else if(r[s.id]==='ausente')a++;else if(r[s.id]==='tarde')t++;});
    html+=`<td class="c" style="font-size:7.5pt;background:#e8f0e8">P${p}<br>A${a}<br>T${t}</td>`;
  });
  const tP=tots.reduce((s,x)=>s+x.p,0),tA=tots.reduce((s,x)=>s+x.a,0),tT=tots.reduce((s,x)=>s+x.t,0);
  const tPct=alumnos.length*fechas.length>0?Math.round(tP/(alumnos.length*fechas.length)*100):0;
  html+=`<td class="c" style="background:#a5d6a7">${tP}</td><td class="c" style="background:#ef9a9a">${tA}</td><td class="c" style="background:#ffcc80">${tT}</td><td class="c" style="background:#81c784;font-size:11pt">${tPct}%</td></tr></tbody></table>`;

  // Tardanzas con motivos
  const tardDet=[];
  alumnos.forEach(s=>{
    fechas.forEach(f=>{
      const r=_asist.records[prefix+f]||{};
      if(r[s.id]==='tarde'&&r[s.id+'_motivo']){
        const d=new Date(f+'T12:00');
        tardDet.push({n:s.name,f:d.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}),m:r[s.id+'_motivo']});
      }
    });
  });
  if(tardDet.length){
    html+=`<br><p style="font-size:11pt;font-weight:bold;color:#7a3a00;margin:16px 0 8px">⏰ Detalle de Tardanzas</p><table style="width:auto"><thead><tr><th style="background:#7a3a00;min-width:180px;text-align:left">Alumno</th><th style="background:#7a3a00;min-width:110px">Fecha</th><th style="background:#7a3a00;min-width:260px;text-align:left">Motivo del retardo</th></tr></thead><tbody>`;
    tardDet.forEach((t,i)=>{html+=`<tr style="background:${i%2===0?'#fff8f0':'#fff3e8'}"><td style="font-weight:600;padding:5px 8px">${t.n}</td><td style="text-align:center;padding:5px 8px">${t.f}</td><td style="color:#7a3a00;font-style:italic;padding:5px 8px">${t.m}</td></tr>`;});
    html+=`</tbody></table>`;
  }
  html+=`<p style="font-size:8.5pt;color:#999;margin-top:16px">✅ Presente &nbsp;❌ Ausente &nbsp;⏰ Tarde &nbsp;— &nbsp;Sin registro</p></body></html>`;

  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`${archivo}_${g.name.replace(/[^a-z0-9]/gi,'_')}.xls`;
  a.click();URL.revokeObjectURL(url);
  document.getElementById('exportAsistModal').remove();
  showToast('📊 Reporte Excel generado correctamente','success');
}

let _assignScanStream=null,_assignScanAnim=null;
function escanearQRParaAsignar(sid){
  const area=document.getElementById('qrAssignScanArea');const fb=document.getElementById('qrAssignFeedback');if(!area)return;
  const isHTTPS=location.protocol==='https:'||location.hostname==='localhost';
  area.style.display='block';
  if(!isHTTPS){
    area.innerHTML=`<div style="border:2px dashed #7a9ad0;border-radius:8px;padding:14px;text-align:center;cursor:pointer;background:#f0f4ff" onclick="document.getElementById('qrAssignFileInput').click()">
      <div style="font-size:1.5rem">📷</div><div style="font-size:0.8rem;color:#2a4a7a;font-weight:600;margin-top:4px">Toca para subir foto del QR</div>
      <input type="file" id="qrAssignFileInput" accept="image/*" capture="environment" style="display:none" onchange="_decodeQRForAssign('${sid}',this.files[0]);this.value=''"></div>`;
    return;
  }
  area.innerHTML=`<div style="position:relative;border-radius:8px;overflow:hidden;border:2px solid var(--blue);max-width:300px">
    <video id="assignVideo" autoplay playsinline muted style="width:100%;display:block"></video>
    <canvas id="assignCanvas" style="display:none"></canvas>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:120px;height:120px;border:2.5px solid var(--blue);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4)"></div></div>
  </div>
  <button onclick="_stopAssignScan()" style="margin-top:6px;padding:5px 12px;background:#888;color:white;border:none;border-radius:5px;font-family:inherit;font-size:0.78rem;cursor:pointer">⏹ Detener</button>`;
  _cargarJsQR(()=>{
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
      .then(stream=>{_assignScanStream=stream;const v=document.getElementById('assignVideo');if(v){v.srcObject=stream;v.play();}_assignLoop(sid);})
      .catch(err=>{if(fb)fb.textContent='❌ '+err.message;});
  });
}
function _assignLoop(sid){
  const v=document.getElementById('assignVideo');const c=document.getElementById('assignCanvas');
  if(!v||!c||!window.jsQR){_assignScanAnim=requestAnimationFrame(()=>_assignLoop(sid));return;}
  const ctx=c.getContext('2d');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0,c.width,c.height);
    const code=window.jsQR(ctx.getImageData(0,0,c.width,c.height).data,c.width,c.height);
    if(code&&code.data){
      _stopAssignScan();
      const inp=document.getElementById('qrCodeInput');if(inp){inp.value=code.data;inp.style.borderColor='var(--green)';}
      const fb=document.getElementById('qrAssignFeedback');if(fb)fb.innerHTML=`<span style="color:var(--green);font-weight:700">✅ Leído: "${escHtml(code.data)}" — toca Guardar</span>`;
      return;
    }
  }
  _assignScanAnim=requestAnimationFrame(()=>_assignLoop(sid));
}
function _stopAssignScan(){
  if(_assignScanAnim){cancelAnimationFrame(_assignScanAnim);_assignScanAnim=null;}
  if(_assignScanStream){_assignScanStream.getTracks().forEach(t=>t.stop());_assignScanStream=null;}
  const a=document.getElementById('qrAssignScanArea');if(a)a.style.display='none';
}
window._decodeQRForAssign=function(sid,file){
  if(!file)return;const fb=document.getElementById('qrAssignFeedback');
  _cargarJsQR(()=>{
    const img=new Image();const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1600;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const ctx=cv.getContext('2d');ctx.drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      const code=window.jsQR(ctx.getImageData(0,0,w,h).data,w,h,{inversionAttempts:'attemptBoth'});
      if(code&&code.data){const inp=document.getElementById('qrCodeInput');if(inp){inp.value=code.data;inp.style.borderColor='var(--green)';}if(fb)fb.innerHTML=`<span style="color:var(--green);font-weight:700">✅ Leído: "${escHtml(code.data)}" — toca Guardar</span>`;}
      else{if(fb)fb.innerHTML='<span style="color:red">❌ No se detectó QR. Intenta de nuevo.</span>';}
    };img.src=url;
  });
};

      >${escHtml(motivoActual)}</textarea>

        <div style="display:flex;gap:8px">

        </div>
      </div>

  document.body.appendChild(modal);

  setTimeout(()=>{ const t=document.getElementById('tardeMotivo'); if(t){t.focus();t.selectionStart=t.value.length;} }, 80);
}

function _guardarTarde(sid) {
  _loadAsist();
  const g = currentGroup(); if(!g) return;
  const key = _asistKey(g.id, _asist.fecha);
  if(!_asist.records[key]) _asist.records[key]={};
  const motivo = (document.getElementById('tardeMotivo')?.value||'').trim();
  _asist.records[key][sid] = 'tarde';
  if(motivo) _asist.records[key][sid+'_motivo'] = motivo;
  else delete _asist.records[key][sid+'_motivo'];
  _saveAsist();
  document.getElementById('tardeModal').remove();

  // Actualizar badge en tabla
  const s = g.students.find(x=>x.id===sid);
  const badgeEl = document.getElementById('asistBadge_'+sid);
  if(badgeEl) badgeEl.innerHTML = '<span style="background:#ffe5cc;color:#7a3a00;padding:3px 12px;border-radius:20px;font-weight:700;font-size:0.78rem">⏰ Tarde'+(motivo?' — '+escHtml(motivo):'')+'</span>';

  // Feedback
  const fb = document.getElementById('asistLastScan');
  const nm = document.getElementById('asistLastName');
  const dt = document.getElementById('asistLastDetail');
  const ic = document.getElementById('asistLastIcon');
  if(fb&&nm&&dt&&ic){
    fb.style.display='flex'; fb.style.background='#fff8e6'; fb.style.borderColor='#f0c060';
    nm.textContent = s?s.name:sid;
    ic.textContent = '⏰';
    dt.textContent = 'Tardanza' + (motivo?' — '+motivo:'') + ' ('+_asist.fecha+')';
  }

  // Beep de tono diferente para tardanza
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator();const gn=ac.createGain();
    o.connect(gn);gn.connect(ac.destination);
    o.frequency.value=660;gn.gain.setValueAtTime(0.12,ac.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
    o.start();o.stop(ac.currentTime+0.3);
  }catch(e){}

  showToast(`⏰ ${s?s.name:sid} — Tardanza registrada`+(motivo?` (${motivo})`:''),'');
}

// ════════════════════════════════════════════════════════════════════
// LÓGICA DE FUSIÓN DE DATOS (usada por P2P y por importación manual)
// ════════════════════════════════════════════════════════════════════

/**
 * Aplica un payload sync_v1 recibido (por P2P o archivo) al estado local.
 * Fusiona calificaciones, tareas, conducta y asistencia sin borrar datos existentes.
 */
function _aplicarSincDia(sync, fbEl) {
  let calMerged = 0, asistMerged = 0, gruposMerged = 0;

  Object.values(sync.grupos).forEach(sg => {
    let localG = data.groups.find(g => g.id === sg.id);

    if (!localG) {
      data.groups.push({ ...sg });
      gruposMerged++;
      return;
    }

    // Calificaciones: solo sobreescribe si tiene valor
    Object.keys(sg.grades || {}).forEach(k => {
      if (sg.grades[k] !== undefined && sg.grades[k] !== '') {
        localG.grades[k] = sg.grades[k];
        calMerged++;
      }
    });

    // Tareas
    Object.keys(sg.hwStatus || {}).forEach(k => {
      localG.hwStatus[k] = sg.hwStatus[k];
    });

    // Conducta: conserva el nivel más alto
    Object.keys(sg.conduct || {}).forEach(k => {
      if (!localG.conduct[k] || (sg.conduct[k]?.level || 0) > (localG.conduct[k]?.level || 0)) {
        localG.conduct[k] = sg.conduct[k];
      }
    });

    // Asistencia (en localStorage)
    const stored = JSON.parse(localStorage.getItem('regCalif_v3') || '{}');
    if (!stored.asistencia) stored.asistencia = {};
    Object.keys(sg.asistencia || {}).forEach(k => {
      stored.asistencia[k] = { ...(stored.asistencia[k] || {}), ...sg.asistencia[k] };
      asistMerged++;
    });
    localStorage.setItem('regCalif_v3', JSON.stringify(stored));
    gruposMerged++;
  });

  autoSave();
  renderMain();

  const msg = `✅ Sincronización completa — ${calMerged} calificaciones · ${asistMerged} asistencias · ${gruposMerged} grupo${gruposMerged !== 1 ? 's' : ''}`;
  const fb = fbEl || document.getElementById('sincScanFeedback');
  if (fb) {
    fb.innerHTML = `<div style="background:#f0fff4;border:1.5px solid #a0ddb0;border-radius:8px;
      padding:10px 14px;font-weight:700;color:#155724">${msg}</div>`;
  }
  showToast(msg, 'success');

  // Tonos de éxito
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100, 1320].forEach((freq, i) => {
      const osc = ac.createOscillator(), gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.12, ac.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.12 + 0.2);
      osc.start(ac.currentTime + i * 0.12);
      osc.stop(ac.currentTime + i * 0.12 + 0.2);
    });
  } catch(e) {}
}

/**
 * Importa un archivo sync_v1.json desde un input[type=file].
 * Complemento manual al P2P para cuando no hay internet.
 */
function importarSincDia(input) {
  const file = input.files[0];
  if (!file) return;
  const label = document.getElementById('sincImportLabel');
  if (label) label.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const sync = JSON.parse(e.target.result);
      if (sync.version !== 'sync_v1') { showToast('Archivo no es un sync válido', 'error'); return; }
      _aplicarSincDia(sync);
    } catch(err) { showToast('Error al leer archivo: ' + err.message, 'error'); }
    input.value = '';
  };
  reader.readAsText(file);
}

function _getSyncHoy() {
  const hoy = new Date().toISOString().slice(0,10);
  const cambios = { fecha: hoy, version: 'sync_v1', grupos: {} };
  let totalCambios = 0;

  data.groups.forEach(g => {
    const grpCambios = { grades: {}, hwStatus: {}, conduct: {}, asistencia: {} };
    let hayCambios = false;

    // Calificaciones modificadas hoy
    // Usamos el campo _lastEdit si existe, o incluimos todas (fallback seguro)
    Object.keys(g.grades||{}).forEach(k => {
      if (g.grades[k] !== undefined && g.grades[k] !== '') {
        grpCambios.grades[k] = g.grades[k];
        hayCambios = true; totalCambios++;
      }
    });

    // Tareas de hoy
    Object.keys(g.hwStatus||{}).forEach(k => {
      grpCambios.hwStatus[k] = g.hwStatus[k];
      hayCambios = true;
    });

    // Conducta
    Object.keys(g.conduct||{}).forEach(k => {
      grpCambios.conduct[k] = g.conduct[k];
      hayCambios = true;
    });

    // Asistencia de hoy
    const asistData = JSON.parse(localStorage.getItem('regCalif_v3')||'{}').asistencia || {};
    const keyHoy = g.id + '_' + hoy;
    if (asistData[keyHoy]) {
      grpCambios.asistencia[keyHoy] = asistData[keyHoy];
      hayCambios = true;
    }

    if (hayCambios) {
      cambios.grupos[g.id] = {
        id: g.id, name: g.name, subject: g.subject || '',
        students: g.students, // incluir alumnos para que laptop reconozca IDs
        ...grpCambios
      };
    }
  });

  cambios.totalCambios = totalCambios;
  return cambios;
}

function _renderSyncInfo() {
  const el = document.getElementById('syncDayInfo');
  if (!el) return;
  const hoy = new Date().toISOString().slice(0,10);
  const sync = _getSyncHoy();
  const nGrupos = Object.keys(sync.grupos).length;
  const nCal = sync.totalCambios;
  const asistData = JSON.parse(localStorage.getItem('regCalif_v3')||'{}').asistencia || {};
  const nAsist = Object.keys(asistData).filter(k=>k.endsWith('_'+hoy)).length;

  el.innerHTML = `
    <div style="font-weight:700;margin-bottom:6px;color:#1a2a5a">📊 Datos disponibles para sincronizar</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div><span style="font-size:1.2rem;font-weight:700;color:#2a5a8a">${nGrupos}</span> <span style="font-size:0.78rem;color:#555">grupo${nGrupos!==1?'s':''}</span></div>
      <div><span style="font-size:1.2rem;font-weight:700;color:#2a7a4b">${nCal}</span> <span style="font-size:0.78rem;color:#555">calificaciones</span></div>
      <div><span style="font-size:1.2rem;font-weight:700;color:#b85c00">${nAsist}</span> <span style="font-size:0.78rem;color:#555">registros asistencia</span></div>

}

function exportarSincDia() {
  const sync = _getSyncHoy();
  if (Object.keys(sync.grupos).length === 0) {
    showToast('No hay datos para sincronizar hoy', 'error'); return;
  }
  const json = JSON.stringify(sync, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sync_${sync.fecha}_${new Date().getHours()}h${String(new Date().getMinutes()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📄 Archivo de sincronización listo — mándalo por WhatsApp o USB', 'success');
}

function mostrarQRSincDia() {
  const sync = _getSyncHoy();
  if (Object.keys(sync.grupos).length === 0) {
    showToast('No hay datos para mostrar', 'error'); return;
  }

  // Quitar 'students' del payload para reducir tamaño (la laptop ya los tiene)
  const syncSlim = { fecha: sync.fecha, version: sync.version, grupos: {} };
  Object.keys(sync.grupos).forEach(gid => {
    const g = sync.grupos[gid];
    syncSlim.grupos[gid] = {
      id: g.id, name: g.name, subject: g.subject || '',
      grades: g.grades || {},
      hwStatus: g.hwStatus || {},
      conduct: g.conduct || {},
      asistencia: g.asistencia || {}
    };
    // omitir g.students — ahorra ~70% del payload
  });

  // Comprimir con LZ y codificar en base64
  const json = JSON.stringify(syncSlim);
  const compressed = LZString.compressToBase64(json);
  const payload = 'LZ:' + compressed; // prefijo para que el lector sepa descomprimir

  const charCount = payload.length;
  const qrSize = charCount <= 800 ? 1 : charCount <= 1600 ? 2 : charCount <= 2400 ? 3 : Math.ceil(charCount/800);

  const ex = document.getElementById('sincQRModal'); if(ex) ex.remove();
  const modal = document.createElement('div');
  modal.id = 'sincQRModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px';

  // Si cabe en 1 QR (≤2953 chars con nivel L)
  if (payload.length <= 2800) {
    modal.innerHTML = `
      <div style="color:white;text-align:center">
        <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px">📷 Código QR de Sincronización</div>
        <div style="font-size:0.78rem;opacity:0.75">Escanea desde la laptop con la cámara</div>
      </div>
      <div style="background:white;border-radius:16px;padding:20px;text-align:center">
        <div id="sincQRCode" style="display:flex;justify-content:center;margin-bottom:10px"></div>
        <div style="font-size:0.72rem;color:#888">${Object.keys(syncSlim.grupos).length} grupo(s) · ${json.length} → ${compressed.length} chars comprimido</div>
      </div>
      <button onclick="document.getElementById('sincQRModal').remove()" style="color:white;background:none;border:1.5px solid rgba(255,255,255,0.5);border-radius:8px;padding:10px 28px;font-family:inherit;font-size:0.9rem;cursor:pointer">✕ Cerrar</button>
    `;
    document.body.appendChild(modal);

    const container = document.getElementById('sincQRCode');
    const div = document.createElement('div');
    container.appendChild(div);
    // Nivel L = máxima capacidad (~2953 chars), QR grande para mejor lectura
    new QRCode(div, { text: payload, width: 300, height: 300, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.L });

  } else {
    // Fallback: dividir en chunks si los datos son muy grandes
    const CHUNK = 900;
    const chunks = [];
    for (let i = 0; i < payload.length; i += CHUNK) chunks.push(payload.slice(i, i + CHUNK));

    modal.innerHTML = `
      <div style="color:white;text-align:center">
        <div style="font-size:1.2rem;font-weight:700;margin-bottom:4px">📷 QRs de Sincronización</div>
        <div style="font-size:0.78rem;opacity:0.75">Escanea cada QR en orden desde la laptop</div>
      </div>
      <div style="background:white;border-radius:16px;padding:20px;text-align:center;min-width:280px">
        <div id="sincQRCode" style="display:flex;justify-content:center;margin-bottom:10px"></div>
        <div id="sincQRLabel" style="font-size:0.88rem;font-weight:700;color:#1a1a2e;margin-bottom:4px"></div>
        <div id="sincQRSub" style="font-size:0.72rem;color:#888;margin-bottom:14px"></div>
        <div style="display:flex;gap:8px;justify-content:center">
          <button id="sincQRPrev" onclick="_sincQRNav(-1)" style="padding:8px 20px;background:#f0f0f0;color:#333;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:0.85rem;font-weight:600;cursor:pointer">← Anterior</button>
          <button id="sincQRNext" onclick="_sincQRNav(1)" style="padding:8px 20px;background:#2a4a8a;color:white;border:none;border-radius:6px;font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer">Siguiente →</button>
        </div>
      </div>
      <button onclick="document.getElementById('sincQRModal').remove()" style="color:white;background:none;border:1.5px solid rgba(255,255,255,0.5);border-radius:8px;padding:10px 28px;font-family:inherit;font-size:0.9rem;cursor:pointer">✕ Cerrar</button>
    `;
    document.body.appendChild(modal);
    window._sincChunks = chunks;
    window._sincQRIdx = 0;
    _renderSincQR();
  }
}

function _renderSincQR() {
  const chunks = window._sincChunks;
  const idx = window._sincQRIdx;
  const total = chunks.length;
  const payload = JSON.stringify({i:idx, t:total, d:chunks[idx]});

  const container = document.getElementById('sincQRCode');
  container.innerHTML = '';
  const div = document.createElement('div');
  container.appendChild(div);

  new QRCode(div, { text: payload, width: 280, height: 280, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.L });

  document.getElementById('sincQRLabel').textContent = `QR ${idx+1} de ${total}`;
  document.getElementById('sincQRSub').textContent = idx===total-1 ? '✅ Último QR' : `Escanea este, luego toca Siguiente →`;
  document.getElementById('sincQRPrev').style.opacity = idx===0?'0.3':'1';
  const btn = document.getElementById('sincQRNext');
  btn.textContent = idx===total-1 ? '✅ Listo' : 'Siguiente →';
  btn.onclick = idx===total-1 ? ()=>document.getElementById('sincQRModal').remove() : ()=>_sincQRNav(1);
}

function _sincQRNav(dir) {
  window._sincQRIdx = Math.max(0, Math.min(window._sincChunks.length-1, window._sincQRIdx+dir));
  _renderSincQR();
}

function _cargarQRCode(cb) {
  // QRCode library is now embedded inline - always available
  cb();
}

function fbLoadConfig() {

    const c = JSON.parse(localStorage.getItem(FB_CONFIG_KEY) || 'null');
    if (c && c.apiKey && c.databaseURL) { FB.config = c; return true; }
  } catch(e) {}
  // Si no hay config guardada, usar la pre-integrada
  FB.config = _FB_DEFAULT_CONFIG;
  localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(_FB_DEFAULT_CONFIG));
  return true;
